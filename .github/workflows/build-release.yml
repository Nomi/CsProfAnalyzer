name: Build and Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      skip_validation:
        description: 'Skip version validation'
        required: false
        default: 'false'
      force_overwrite:
        description: 'Overwrite existing tag/release'
        required: false
        default: 'false'
      release_notes:
        description: 'Additional notes for the release'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history to compare against base branch
      - id: check
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            base_ref="origin/${{ github.base_ref }}"
          else
            base_ref="HEAD^"
          fi
          
          files=$(git diff --name-only $base_ref HEAD)
          relevant_files=""
          for f in $files; do
            if ! python build_utils/ci_cd_utils.py check "$f"; then
              relevant_files="$relevant_files $f"
            fi
          done
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
             echo "version_changed=true" >> $GITHUB_OUTPUT
          elif [ -n "$relevant_files" ]; then
            git show $base_ref:src/core/__version__.py > old_version.py
            if python build_utils/ci_cd_utils.py old_version.py src/core/__version__.py; then
              echo "version_changed=true" >> $GITHUB_OUTPUT
            else
              echo "Error: Version must be incremented relative to $base_ref."
              exit 1
            fi
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

  build-and-test:
    needs: [validate-version]
    # Run on PRs (to test pseudo-merge) or when version changes on push/dispatch
    if: github.event_name == 'pull_request' || needs.validate-version.outputs.version_changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r src/requirements.txt
          pip install -r build_utils/requirements/test.txt
          pip install pyinstaller pyinstaller-hooks-contrib
      - name: Build executable
        run: pyinstaller --clean build_utils/CsProfAnalyzer.spec
      - name: Test executable
        run: ./dist/CsProfAnalyzer.exe --help
      - name: Create Source Archive
        run: |
          7z a dist/CsProfAnalyzer-script-${{ steps.get_version.outputs.version || '0.1.9' }}.zip src/
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            dist/CsProfAnalyzer.exe
            dist/CsProfAnalyzer-script-*.zip

  release:
    needs: [build-and-test]
    # Allowlist: only on push to production branches OR manual dispatch
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: dist
      - name: Get Version
        id: get_version
        run: |
          version=$(grep "__version__ =" src/core/__version__.py | cut -d'"' -f2 | xargs)
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Generate Changelog
        id: changelog
        run: |
          {
            echo "body<<EOF"
            if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              echo "Manually triggered release."
              echo "${{ github.event.inputs.release_notes }}"
            else
              git log -1 --pretty=format:"%s%n%b"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          TAG=v${{ steps.get_version.outputs.version }}
          if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_overwrite == 'true' }}" == "true" ]; then
            git tag -d $TAG || true
            git push --delete origin $TAG || true
          fi
          git tag $TAG
          git push origin $TAG
      - name: Rename executable
        run: |
          mv dist/CsProfAnalyzer.exe dist/CsProfAnalyzer-win64-${{ steps.get_version.outputs.version }}.exe
          # Only rename if the source and destination are different to avoid errors
          if [ ! -f "dist/CsProfAnalyzer-script-${{ steps.get_version.outputs.version }}.zip" ]; then
            mv dist/CsProfAnalyzer-script-*.zip dist/CsProfAnalyzer-script-${{ steps.get_version.outputs.version }}.zip
          fi
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/CsProfAnalyzer-win64-${{ steps.get_version.outputs.version }}.exe
            dist/CsProfAnalyzer-script-${{ steps.get_version.outputs.version }}.zip

      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          update_release_body: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/CsProfAnalyzer-win64-${{ steps.get_version.outputs.version }}.exe
            dist/CsProfAnalyzer-script-${{ steps.get_version.outputs.version }}.zip
