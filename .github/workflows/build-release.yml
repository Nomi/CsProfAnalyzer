name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qvE '^(ReadMe\.md|\.github\/)'; then
            if git diff HEAD^ HEAD core/__version__.py | grep -q '^\+__version__ ='; then
              echo "version_changed=true" >> $GITHUB_OUTPUT
            else
              echo "Error: __version__.py must be updated when code changes."
              exit 1
            fi
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pylint pandas numpy tqdm colorama
      - name: Run Pylint
        run: python -m pylint core/*.py CsProfAnalyzer.py

  build:
    needs: [validate-version, lint]
    if: needs.validate-version.outputs.version_changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas numpy tqdm colorama pyinstaller
      - name: Build executable
        run: pyinstaller --onefile --name CsProfAnalyzer CsProfAnalyzer.py
      - name: Get Version
        id: get_version
        shell: python
        run: |
          with open('core/__version__.py') as f:
            version = f.read().split('"')[1]
            print(f"version={version}", file=open(os.environ['GITHUB_OUTPUT'], 'a'))
      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${{ steps.get_version.outputs.version }}
          git push origin v${{ steps.get_version.outputs.version }}
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          files: |
            dist/CsProfAnalyzer.exe
