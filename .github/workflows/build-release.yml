name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      skip_validation:
        description: 'Skip version validation'
        required: false
        default: 'false'
      release_notes:
        description: 'Additional notes for the release'
        required: false
        default: ''

jobs:
  validate-version:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          IGNORE_PATTERN='^(.*\.md|\.gitignore|\.github\/.*)$'
          if git diff --name-only HEAD^ HEAD | grep -qvE "$IGNORE_PATTERN"; then
            if git diff HEAD^ HEAD core/__version__.py | grep -q '^\+__version__ ='; then
              echo "version_changed=true" >> $GITHUB_OUTPUT
            else
              echo "Error: core/__version__.py must be updated when code changes occur."
              exit 1
            fi
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    needs: [validate-version]
    if: github.event_name == 'workflow_dispatch' || needs.validate-version.outputs.version_changed == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas numpy tqdm colorama pyinstaller
      - name: Build executable
        run: pyinstaller --onefile --name CsProfAnalyzer cs_prof_analyzer.py
      - name: Get Version
        id: get_version
        shell: bash
        run: |
          version=$(python -c "import core.__version__; print(core.__version__.__version__)")
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "Manual release." >> $GITHUB_OUTPUT
            echo "${{ github.event.inputs.release_notes }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body<<EOF" >> $GITHUB_OUTPUT
            git log -1 --pretty=format:"%s%n%b" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${{ steps.get_version.outputs.version }}
          git push origin v${{ steps.get_version.outputs.version }}
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/CsProfAnalyzer.exe
