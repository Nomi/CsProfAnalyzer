name: Build and Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      skip_validation:
        description: 'Skip version validation'
        required: false
        default: 'false'
      force_overwrite:
        description: 'Overwrite existing tag/release'
        required: false
        default: 'false'
      release_notes:
        description: 'Additional notes for the release'
        required: false
        default: ''

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          files=$(git diff --name-only HEAD^ HEAD)
          relevant_files=""
          for f in $files; do
            if ! python build/ci_cd_utils.py check "$f"; then
              relevant_files="$relevant_files $f"
            fi
          done
          if [ -n "$relevant_files" ]; then
            git show HEAD^:src/core/__version__.py > old_version.py
            if python build/ci_cd_utils.py old_version.py src/core/__version__.py; then
              echo "version_changed=true" >> $GITHUB_OUTPUT
            else
              echo "Error: Version must be incremented."
              exit 1
            fi
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

  build-and-test:
    needs: [validate-version]
    if: github.event_name == 'workflow_dispatch' || needs.validate-version.outputs.version_changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r src/requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib
      - name: Build executable
        run: pyinstaller --clean build/CsProfAnalyzer.spec
      - name: Test executable
        run: ./dist/CsProfAnalyzer.exe --help
      - name: Create Source Archive
        run: |
          7z a dist/CsProfAnalyzer-script-${{ github.event.inputs.version || '0.1.6' }}.zip src/
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            dist/CsProfAnalyzer.exe
            dist/CsProfAnalyzer-script-*.zip

  release:
    needs: [build-and-test]
    # Only run release if on master/main and it's a push or manual trigger, not a PR/feature branch
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: Production
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: dist
      - name: Get Version
        id: get_version
        run: |
          # Extract version, trim whitespace/quotes
          version=$(grep "__version__ =" src/core/__version__.py | cut -d'"' -f2 | xargs)
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Generate Changelog
        id: changelog
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "Manually triggered release." >> $GITHUB_OUTPUT
            echo "${{ github.event.inputs.release_notes }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body<<EOF" >> $GITHUB_OUTPUT
            git log -1 --pretty=format:"%s%n%b" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          TAG=v${{ steps.get_version.outputs.version }}
          if [ "${{ github.event.inputs.force_overwrite }}" == "true" ]; then
            git tag -d $TAG || true
            git push --delete origin $TAG || true
          fi
          git tag $TAG
          git push origin $TAG
      - name: Rename executable
        run: |
          mv dist/CsProfAnalyzer.exe dist/CsProfAnalyzer-win64-${{ steps.get_version.outputs.version }}.exe
          mv dist/CsProfAnalyzer-script-*.zip dist/CsProfAnalyzer-script-${{ steps.get_version.outputs.version }}.zip
      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          update_release_body: true
          files: |
            dist/CsProfAnalyzer-win64-${{ steps.get_version.outputs.version }}.exe
            dist/CsProfAnalyzer-script-${{ steps.get_version.outputs.version }}.zip
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/CsProfAnalyzer-win64-${{ steps.get_version.outputs.version }}.exe
            dist/CsProfAnalyzer-script-${{ steps.get_version.outputs.version }}.zip
