name: Build and Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      skip_validation:
        description: 'Skip version validation'
        required: false
        default: 'false'
      force_overwrite:
        description: 'Overwrite existing tag/release'
        required: false
        default: 'false'
      release_notes:
        description: 'Additional notes for the release'
        required: false
        default: ''

jobs:
  validate-version:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          # Check if relevant files changed
          files=$(git diff --name-only HEAD^ HEAD)
          relevant_files=""
          for f in $files; do
            if ! python .github/scripts/ci_cd_utils.py check "$f"; then
              relevant_files="$relevant_files $f"
            fi
          done

          if [ -n "$relevant_files" ]; then
            git show HEAD^:core/__version__.py > old_version.py
            
            if python .github/scripts/ci_cd_utils.py old_version.py core/__version__.py; then
              echo "version_changed=true" >> $GITHUB_OUTPUT
            else
              echo "Error: core/__version__.py must be incremented when code changes occur."
              exit 1
            fi
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    needs: [validate-version]
    if: github.event_name == 'workflow_dispatch' || needs.validate-version.outputs.version_changed == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib
      - name: Build executable
        run: pyinstaller CsProfAnalyzer.spec
      - name: Test executable
        run: ./dist/CsProfAnalyzer.exe --help
      - name: VirusTotal Scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          update_release_body: true
          files: |
            dist/CsProfAnalyzer.exe
      - name: Get Version
        id: get_version
        shell: bash
        run: |
          version=$(python -c "import core.__version__; print(core.__version__.__version__)")
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "Manually triggered release." >> $GITHUB_OUTPUT
            echo "${{ github.event.inputs.release_notes }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body<<EOF" >> $GITHUB_OUTPUT
            git log -1 --pretty=format:"%s%n%b" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      - name: Create Tag
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          TAG=v${{ steps.get_version.outputs.version }}
          if [ "${{ github.event.inputs.force_overwrite }}" == "true" ]; then
            git tag -d $TAG || true
            git push --delete origin $TAG || true
          fi
          git tag $TAG
          git push origin $TAG
      - name: Rename executable
        shell: bash
        run: mv dist/CsProfAnalyzer.exe dist/CsProfAnalyzer-${{ steps.get_version.outputs.version }}.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist/CsProfAnalyzer-${{ steps.get_version.outputs.version }}.exe
