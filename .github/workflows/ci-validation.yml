name: CI Validation

on:
  pull_request:
    branches:
      - master

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check version change
        run: |
          IGNORE_PATTERN='^(.*\.md|\.gitignore|\.github\/.*|\.git.*)$'
          if git diff --name-only origin/master...HEAD | grep -qvE "$IGNORE_PATTERN"; then
            if git diff origin/master...HEAD core/__version__.py | grep -q '^\+__version__ ='; then
              echo "Version updated correctly."
            else
              echo "Error: core/__version__.py must be updated when code changes occur."
              exit 1
            fi
          else
            echo "No code changes, skipping version validation."
          fi

  validate-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint pandas numpy tqdm colorama
      - name: Run Pylint
        run: true

  validate-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint pandas numpy tqdm colorama
      - name: Run Tests
        run: python -m unittest discover tests
