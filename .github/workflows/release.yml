name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas numpy tqdm colorama pyinstaller
      - name: Build executable
        run: pyinstaller --onefile --name CsProfAnalyzer CsProfAnalyzer.py
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CsProfAnalyzer.exe
