name: CI / Quality Check

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version change
        run: |
          # Identify the base branch (master or main)
          base_branch=$(git branch -r | grep -E 'origin/(master|main)$' | head -n 1)
          
          # Get files that changed compared to the base branch
          files=$(git diff --name-only $base_branch...HEAD)
          relevant_files=""
          for f in $files; do
            if ! python .github/scripts/ci_cd_utils.py check "$f"; then
              relevant_files="$relevant_files $f"
            fi
          done

          if [ -n "$relevant_files" ]; then
            echo "The following files triggered the version bump requirement:"
            echo "$relevant_files"
            
            # Extract old and new versions
            old_version=$(git show $base_branch:core/__version__.py | grep "__version__ =" | cut -d'"' -f2)
            new_version=$(grep "__version__ =" core/__version__.py | cut -d'"' -f2)

            if python .github/scripts/ci_cd_utils.py "$old_version" "$new_version"; then
              echo "Version incremented successfully ($old_version -> $new_version)."
            else
              echo "Error: core/__version__.py must be incremented when changes occur to non-ignored files."
              exit 1
            fi
          else
            echo "No relevant changes detected, skipping version validation."
          fi


  validate-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint pandas numpy tqdm colorama
      - name: Run Pylint
        run: true

  validate-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint pandas numpy tqdm colorama
      - name: Run Tests
        run: python -m unittest discover tests
