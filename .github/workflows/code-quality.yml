name: CI / Quality Check

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check version change
        run: |
          # Ignore docs, CI, git, and test-related files
          IGNORE_PATTERN='^(ReadMe\.md|\.gitignore|\.github\/.*|\.git.*|tests\/.*)$'
          
          # Only check for version change if actual code (py files) changed
          if git diff --name-only origin/master...HEAD | grep -E '\.py$' | grep -qvE "$IGNORE_PATTERN"; then
            
            # Extract old and new versions
            old_version=$(git show origin/master:core/__version__.py | grep "__version__ =" | cut -d'"' -f2 | tr -d '.')
            new_version=$(grep "__version__ =" core/__version__.py | cut -d'"' -f2 | tr -d '.')
            
            if [ -z "$old_version" ] || [ -z "$new_version" ]; then
              echo "Error: Could not parse versions."
              exit 1
            fi
            
            if [ "$new_version" -gt "$old_version" ]; then
              echo "Version incremented successfully ($old_version -> $new_version)."
            else
              echo "Error: core/__version__.py must be incremented when code changes occur."
              exit 1
            fi
          else
            echo "No code changes detected, skipping version validation."
          fi

  validate-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint pandas numpy tqdm colorama
      - name: Run Pylint
        run: true

  validate-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint pandas numpy tqdm colorama
      - name: Run Tests
        run: python -m unittest discover tests
