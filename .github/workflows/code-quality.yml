name: CI / Quality Check

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check for active PRs
        if: github.event_name == 'push'
        run: |
          PR_COUNT=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${{ github.ref_name }}" | jq length)
          if [ "$PR_COUNT" -gt 0 ]; then
            echo "PR exists for this branch, skipping push run."
            exit 0
          fi
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install -r build_utils/requirements/lint.txt
      - name: Run Pylint
        run: true

  validate-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check for active PRs
        if: github.event_name == 'push'
        run: |
          PR_COUNT=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${{ github.ref_name }}" | jq length)
          if [ "$PR_COUNT" -gt 0 ]; then
            echo "PR exists for this branch, skipping push run."
            exit 0
          fi
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install -r build_utils/requirements/test.txt
      - name: Run Tests
        run: pytest
